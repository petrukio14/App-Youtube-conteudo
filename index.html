<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth OS — Equipe Bauzinho</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --border2: #333;
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --accent: #2563eb;
  --accent-light: #3b82f6;
  --accent-bg: #1a2540;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --radius: 8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding: 24px 16px 60px;
}

.container { max-width: 860px; margin: 0 auto; }

header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.logo {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--accent-bg); border: 1px solid var(--accent);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.logo svg { width: 22px; height: 22px; stroke: var(--accent-light); fill: none; stroke-width: 1.8; }
.header-text h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 1px;
  color: var(--text); line-height: 1;
}
.header-text p { font-size: 12px; color: var(--text2); margin-top: 3px; }
.status-pill {
  margin-left: auto; display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 5px 12px;
  font-size: 11px; color: var(--text2); white-space: nowrap;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }

.agents-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 20px;
}
.agent-tag {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  font-size: 11px; color: var(--text2);
}
.agent-tag svg { width: 12px; height: 12px; stroke: var(--text3); fill: none; stroke-width: 2; flex-shrink: 0; }

.input-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}
.input-card label {
  display: block; font-size: 11px; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.input-row { display: flex; gap: 10px; align-items: flex-end; }
textarea {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 12px 14px;
  resize: none; min-height: 80px;
  transition: border-color 0.15s;
}
textarea:focus { outline: none; border-color: var(--accent); }
textarea::placeholder { color: var(--text3); }

.key-row {
  display: flex; gap: 8px; margin-top: 10px; align-items: center;
}
.key-row input {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text2); font-family: monospace;
  font-size: 12px; padding: 8px 12px;
  transition: border-color 0.15s;
}
.key-row input:focus { outline: none; border-color: var(--accent); color: var(--text); }
.key-label { font-size: 11px; color: var(--text3); white-space: nowrap; }

button.send {
  height: 44px; padding: 0 20px;
  background: var(--accent);
  color: #fff; border: none;
  border-radius: var(--radius);
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  transition: background 0.15s, transform 0.1s;
  display: flex; align-items: center; gap: 8px;
  align-self: flex-end;
}
button.send:hover { background: #1d4ed8; }
button.send:active { transform: scale(0.97); }
button.send:disabled { opacity: 0.45; cursor: not-allowed; }
button.send svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }

.output { display: none; }
.output.visible { display: block; }

.output-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px;
  font-size: 11px; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.output-header svg { width: 14px; height: 14px; stroke: var(--accent-light); fill: none; stroke-width: 2; }

.section {
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
}
.section-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 500;
  color: var(--text2); letter-spacing: 0.3px;
}
.section-head .icon { font-size: 14px; }
.section-body { padding: 14px 16px; }

.resumo-text {
  font-size: 14px; line-height: 1.75;
  color: var(--text); background: var(--accent-bg);
  border-left: 3px solid var(--accent);
  padding: 12px 14px; border-radius: 0 var(--radius) var(--radius) 0;
}

.agent-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.agent-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.agent-item-name {
  font-size: 10px; font-weight: 600;
  color: var(--accent-light); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 4px;
}
.agent-item-text { font-size: 13px; color: var(--text); line-height: 1.65; }

.steps-list { list-style: none; }
.steps-list li {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.steps-list li:last-child { border-bottom: none; }
.step-num {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent-bg); border: 1px solid var(--accent);
  color: var(--accent-light); font-size: 11px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
}
.step-text { font-size: 13px; line-height: 1.65; color: var(--text); padding-top: 2px; }

.tag-list { display: flex; flex-direction: column; gap: 6px; }
.tag-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; color: var(--text); line-height: 1.6;
}
.tag-icon { flex-shrink: 0; margin-top: 2px; font-size: 15px; }

.decision-box {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 14px; line-height: 1.75;
  color: var(--text);
}

.auto-text { font-size: 13px; line-height: 1.75; color: var(--text); }

.loading-wrap {
  text-align: center; padding: 40px 20px;
  color: var(--text2); font-size: 13px;
}
.spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border2);
  border-top-color: var(--accent-light);
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: #1a0a0a; border: 1px solid var(--danger);
  border-radius: var(--radius); padding: 14px 16px;
  color: #f87171; font-size: 13px;
}

@media (max-width: 600px) {
  .input-row { flex-direction: column; }
  button.send { width: 100%; justify-content: center; }
  .status-pill { display: none; }
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
    </div>
    <div class="header-text">
      <h1>Growth OS</h1>
      <p>Central de Crescimento IA — Equipe Bauzinho</p>
    </div>
    <div class="status-pill"><div class="dot"></div>15 agentes ativos</div>
  </header>

  <div class="agents-grid">
    <div class="agent-tag"><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>Diretor Executivo</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>Estratégia</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 00-1.95 1.96A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.4a2.78 2.78 0 001.95-1.96A29 29 0 0023 12a29 29 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>YouTube</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Shorts</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>Instagram</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 104 4V4a5 5 0 005 5"/></svg>TikTok</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Copywriter</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>Psicólogo</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Thumbnail</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Dados</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Pesquisador</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>IA</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Dev</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Monetização</div>
    <div class="agent-tag"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Financeiro</div>
  </div>

  <div class="input-card">
    <label>Consulte o conselho</label>
    <div class="input-row">
      <textarea id="question" placeholder="Ex: Como posso monetizar o canal além do AdSense? Qual conteúdo viraliza no TikTok para o nicho de Fiorino?" rows="3"></textarea>
      <button class="send" id="sendBtn" onclick="runGrowthOS()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Consultar
      </button>
    </div>
    <div class="key-row">
      <span class="key-label">API Key NVIDIA:</span>
      <input type="password" id="apiKey" placeholder="nvapi-..." value="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" />
    </div>
  </div>

  <div class="output" id="output"></div>

</div>

<script>
const SYSTEM_PROMPT = `Você é um Sistema Operacional de Inteligência Artificial chamado Growth OS.

Sua missão é administrar um conselho permanente de especialistas que trabalham juntos para fazer o negócio crescer.

Você SEMPRE cria uma reunião interna entre especialistas antes de entregar a resposta final.

CONTEXTO DO PROJETO:
O usuário é Pedro, criador de conteúdo no nicho de transporte, logística, Fiorino, fretes, motoristas autônomos e empreendedorismo. Ele possui:
- Canal YouTube "Equipe Bauzinho" (~4K inscritos) sobre Fiorino/frete
- TikTok "Equipe Balzinho" (lives às 19h)
- Canal "Família Fortunato" (vlogs/viagens)
- TikTok "Cabuloso Sport" (futebol)
- Ferramentas web: simulador CLT vs Frete, gerador de orçamentos, mural de vagas — GitHub Pages (petrukio14)
- App "Bauzinho Finanças"
- Board game "Missão Milionária" (educação financeira)
Ele quer crescer também em tecnologia, IA, apps e negócios digitais.

OBJETIVO PRINCIPAL: construir uma empresa digital forte através de YouTube, Instagram, TikTok, Site, Aplicativos, IA, Produtos Digitais, Cursos, Comunidade, Marca Pessoal.

RESPONDA SEMPRE NESTE FORMATO EXATO:

## RESUMO EXECUTIVO
[2-3 linhas resumindo a situação e oportunidade]

## ANÁLISE DOS AGENTES

**Diretor Executivo:** [análise]
**Estratégia:** [análise]
**YouTube:** [análise]
**TikTok:** [análise]
**Instagram:** [análise]
**Copywriter:** [análise]
**Psicólogo:** [análise]
**Thumbnail:** [análise]
**IA & Automação:** [análise]
**Desenvolvimento:** [análise]
**Monetização:** [análise]
**Financeiro:** [análise]

## PLANO DE AÇÃO
1. [passo 1]
2. [passo 2]
3. [passo 3]
4. [passo 4]
5. [passo 5]

## RISCOS
- [risco 1]
- [risco 2]
- [risco 3]

## OPORTUNIDADES
- [oportunidade 1]
- [oportunidade 2]
- [oportunidade 3]

## AUTOMAÇÕES
[liste tarefas que podem ser automatizadas com IA]

## DECISÃO FINAL DO DIRETOR
[decisão objetiva, prática e priorizada em 3-5 linhas]`;

function renderOutput(text) {
  const out = document.getElementById('output');
  out.className = 'output visible';

  const sections = [
    { key: '## RESUMO EXECUTIVO', label: '📋 Resumo Executivo', type: 'resumo' },
    { key: '## ANÁLISE DOS AGENTES', label: '👥 Análise dos Agentes', type: 'agents' },
    { key: '## PLANO DE AÇÃO', label: '🎯 Plano de Ação', type: 'steps' },
    { key: '## RISCOS', label: '⚠️ Riscos', type: 'risks' },
    { key: '## OPORTUNIDADES', label: '🚀 Oportunidades', type: 'opps' },
    { key: '## AUTOMAÇÕES', label: '🤖 Automações', type: 'auto' },
    { key: '## DECISÃO FINAL DO DIRETOR', label: '✅ Decisão Final do Diretor', type: 'decision' },
  ];

  const found = sections
    .map(s => ({ ...s, idx: text.indexOf(s.key) }))
    .filter(s => s.idx >= 0)
    .sort((a, b) => a.idx - b.idx);

  let html = '<div class="output-header"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Resposta do Conselho</div>';

  found.forEach((sec, i) => {
    const start = sec.idx + sec.key.length;
    const end = i + 1 < found.length ? found[i + 1].idx : text.length;
    const content = text.slice(start, end).trim();

    html += `<div class="section"><div class="section-head"><span class="icon">${sec.label.split(' ')[0]}</span>${sec.label.slice(sec.label.indexOf(' ') + 1)}</div><div class="section-body">`;

    if (sec.type === 'resumo') {
      html += `<div class="resumo-text">${content}</div>`;

    } else if (sec.type === 'agents') {
      const lines = content.split('\n').filter(l => l.trim());
      lines.forEach(line => {
        const m = line.match(/^\*\*(.+?):\*\*\s*(.+)/);
        if (m) html += `<div class="agent-item"><div class="agent-item-name">${m[1]}</div><div class="agent-item-text">${m[2]}</div></div>`;
      });

    } else if (sec.type === 'steps') {
      html += '<ol class="steps-list">';
      content.split('\n').filter(l => l.trim()).forEach((line, idx) => {
        const clean = line.replace(/^\d+\.\s*/, '').trim();
        if (clean) html += `<li><div class="step-num">${idx + 1}</div><div class="step-text">${clean}</div></li>`;
      });
      html += '</ol>';

    } else if (sec.type === 'risks') {
      html += '<div class="tag-list">';
      content.split('\n').filter(l => l.trim()).forEach(line => {
        const clean = line.replace(/^[-*]\s*/, '').trim();
        if (clean) html += `<div class="tag-item"><span class="tag-icon">⚠️</span><span>${clean}</span></div>`;
      });
      html += '</div>';

    } else if (sec.type === 'opps') {
      html += '<div class="tag-list">';
      content.split('\n').filter(l => l.trim()).forEach(line => {
        const clean = line.replace(/^[-*]\s*/, '').trim();
        if (clean) html += `<div class="tag-item"><span class="tag-icon">⭐</span><span>${clean}</span></div>`;
      });
      html += '</div>';

    } else if (sec.type === 'decision') {
      html += `<div class="decision-box">${content}</div>`;

    } else {
      html += `<div class="auto-text">${content}</div>`;
    }

    html += '</div></div>';
  });

  out.innerHTML = html;
}

async function runGrowthOS() {
  const question = document.getElementById('question').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!question) { alert('Digite sua pergunta primeiro!'); return; }
  if (!apiKey) { alert('Insira sua API Key da NVIDIA!'); return; }

  const btn = document.getElementById('sendBtn');
  const out = document.getElementById('output');
  btn.disabled = true;
  btn.innerHTML = '⏳ Consultando...';
  out.className = 'output visible';
  out.innerHTML = '<div class="loading-wrap"><div class="spinner"></div>Reunindo os 15 especialistas...<br><span style="color:#444;font-size:12px;margin-top:6px;display:block;">Isso pode levar alguns segundos</span></div>';

  try {
    const res = await fetch('https://integrate.api.nvidia.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'meta/llama-3.1-70b-instruct',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: question }
        ],
        temperature: 0.7,
        max_tokens: 2048
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `Erro ${res.status}`);
    }

    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '';
    if (!text) throw new Error('Resposta vazia da API');
    renderOutput(text);

  } catch (e) {
    out.innerHTML = `<div class="error-box">❌ <strong>Erro:</strong> ${e.message}<br><br><small>Verifique sua API Key da NVIDIA e tente novamente.</small></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" stroke="#fff" fill="none" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Consultar';
  }
}

document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runGrowthOS(); }
});
</script>
</body>
</html>
